name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke compile
        run: anvil-compile compile --request "CI smoke compile" --context-file examples/sample_context.md --tool-file examples/tools.json --scope-path src --scope-out prod --out .anvil/ci_plan.json --prompt-out .anvil/ci_prompt.txt

      - name: Ledger verification
        run: anvil-compile verify-ledger --ledger .anvil/anvil_ledger.sqlite3 --require-anchor

      - name: API smoke tests
        env:
          ANVIL_API_KEY: ci-local-key
        run: python -m unittest tests.test_api -v
